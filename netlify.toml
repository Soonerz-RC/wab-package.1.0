# Netlify config for WAB Package 1.0 data room.
#
# The site/ folder is the static publish root. Generated JSON data lives in
# the repo's data/ folder. The build step below copies data/ into the
# publish folder (site/data/) so the HTML can fetch data/tracts.json etc.
# via relative paths.
#
# CLAUDE.md §6 keeps data/ at the repo root as the canonical location; this
# build step is an ephemeral copy that exists only inside Netlify's build
# sandbox.

[build]
  publish = "site"
  command = "mkdir -p site/data && cp data/*.json site/data/"

# Cache strategy:
# - HTML files: minimal cache + must-revalidate. The HTML carries
#   ?v=YYYY-MM-DD-N query strings on its asset references, so a fresh
#   HTML fetch is what invalidates a stale JS/CSS cache. Keeping HTML
#   on a short revalidation interval means asset version bumps reach
#   buyers' browsers within ~60 seconds of deploy.
# - JSON data: short cache so refresh cycles propagate to buyers quickly.
# - CSS / JS: long cache is safe because the HTML's ?v= query bumps the
#   URL each time the file changes (separate URL = separate cache entry).
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
